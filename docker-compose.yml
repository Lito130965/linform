services:
  linform:
    build: .
    image: linform:latest
    restart: unless-stopped
    ports:
      # Host port is configurable so Linform can live next to other apps.
      - "${LINFORM_PORT:-8100}:8000"
    environment:
      LINFORM_DATABASE_URL: "postgresql+asyncpg://linform:${LINFORM_DB_PASSWORD:-linform}@db:5432/linform"
      LINFORM_API_TOKEN: "${LINFORM_API_TOKEN:-}"
      LINFORM_RENDER_TOKEN: "${LINFORM_RENDER_TOKEN:-}"
      LINFORM_ADMIN_TOKEN: "${LINFORM_ADMIN_TOKEN:-}"
      # AI assistant (BYOK) — empty key means the feature stays off.
      LINFORM_AI_BASE_URL: "${LINFORM_AI_BASE_URL:-https://api.openai.com/v1/}"
      LINFORM_AI_API_KEY: "${LINFORM_AI_API_KEY:-}"
      LINFORM_AI_MODEL: "${LINFORM_AI_MODEL:-gpt-4o-mini}"
      LINFORM_AI_SEND_TEST_DATA: "${LINFORM_AI_SEND_TEST_DATA:-false}"
      LINFORM_RENDER_TIMEOUT_SECONDS: "${LINFORM_RENDER_TIMEOUT_SECONDS:-30}"
      LINFORM_RENDER_MAX_WORKERS: "${LINFORM_RENDER_MAX_WORKERS:-2}"
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    # Deliberately not exposed on the host: the app reaches it via the
    # compose network, and host port 5432 may belong to something else.
    environment:
      POSTGRES_USER: linform
      POSTGRES_PASSWORD: "${LINFORM_DB_PASSWORD:-linform}"
      POSTGRES_DB: linform
    volumes:
      - linform_pgdata:/var/lib/postgresql/data

volumes:
  linform_pgdata:
