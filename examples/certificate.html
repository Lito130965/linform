<!-- Certificate: fixed one-page layout.
     Shows: absolute positioning against a page-sized container, a conditional
     if-block, and character cells that must never wrap.
     (Note: Jinja parses HTML comments too, so no literal tag syntax here.) -->
<html>
<head>
<meta charset="utf-8">
<style>
  @page { size: A4 landscape; margin: 0; }
  body { font-family: 'Liberation Serif', serif; margin: 0; }
  .sheet {
    /* A fixed sheet is fine here: nothing on a certificate grows with data. */
    width: 297mm; height: 209mm; position: relative; overflow: hidden;
    padding: 20mm; box-sizing: border-box;
  }
  .frame {
    position: absolute; top: 8mm; left: 8mm; right: 8mm; bottom: 8mm;
    border: 1.2mm double #1a3a6b;
  }
  .title { text-align: center; font-size: 34pt; color: #1a3a6b; margin-top: 18mm; letter-spacing: 4px; }
  .subtitle { text-align: center; font-size: 12pt; color: #555; margin-top: 4mm; }
  .name { text-align: center; font-size: 26pt; margin-top: 14mm; font-style: italic; }
  .body-text { text-align: center; font-size: 13pt; margin: 8mm 30mm 0; line-height: 1.6; }
  .distinction { text-align: center; font-size: 12pt; color: #8a6d1a; margin-top: 4mm; font-weight: bold; }
  .footer { position: absolute; bottom: 22mm; left: 30mm; right: 30mm; display: flex; justify-content: space-between; }
  .sig { text-align: center; width: 70mm; }
  .sig .line { border-top: 1px solid #333; margin-bottom: 1.5mm; }
  .sig .who { font-size: 9pt; color: #666; }
  .serial { position: absolute; bottom: 12mm; right: 30mm; font-size: 9pt; color: #999; }
  /* Character cells: one glyph per box, and the row must never wrap. */
  .cells { white-space: nowrap; }
  .cells span {
    display: inline-block; width: 5mm; height: 6mm; line-height: 6mm;
    border: 0.3mm solid #999; text-align: center; font-family: 'Liberation Mono', monospace;
    margin-right: 0.8mm; font-size: 10pt;
  }
</style>
</head>
<body>
  <div class="sheet">
    <div class="frame"></div>
    <div class="title">CERTIFICATE</div>
    <div class="subtitle">of completion</div>
    <div class="name">{{ student }}</div>
    <div class="body-text">
      has successfully completed the course<br>
      <b>«{{ course }}»</b><br>
      ({{ hours }} academic hours), {{ date }}
    </div>
    {% if distinction %}
    <div class="distinction">— with distinction —</div>
    {% endif %}
    <div class="footer">
      <div class="sig"><div class="line"></div><div class="who">Director — {{ director }}</div></div>
      <div class="sig"><div class="line"></div><div class="who">Instructor — {{ instructor }}</div></div>
    </div>
    <div class="serial">
      Serial:
      <span class="cells">{% for ch in serial %}<span>{{ ch }}</span>{% endfor %}</span>
    </div>
  </div>
</body>
</html>
